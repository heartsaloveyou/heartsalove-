<style>
  :root {
    --bg: #f5f5f7;
    --bg-alt: #ffffff;
    --accent: #ff2b6c;
    --accent-soft: #ff4f88;
    --text: #191924;
    --muted: #6b6b80;
    --card: #ffffff;
    --border: #e0e0ec;
    --font-main: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    --max-width: 960px;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: var(--font-main);
    background: radial-gradient(circle at top, #ffe7f0 0, #f5f5f7 45%, #f0f2f8 100%);
    color: var(--text);
    line-height: 1.6;
  }

  a {
    color: var(--accent-soft);
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  header, section, footer {
    padding: 48px 16px;
  }

  .container {
    max-width: var(--max-width);
    margin: 0 auto;
  }

  .hero {
    padding-top: 72px;
    padding-bottom: 64px;
    text-align: center;
  }

  .hero-title {
    font-size: clamp(2.2rem, 5vw, 3.2rem);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }

  .hero-tagline {
    font-size: 1.05rem;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .hero-subline {
    font-size: 0.98rem;
    color: var(--accent-soft);
    margin-bottom: 32px;
  }

  .hero-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 40px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 500;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.18s ease-out;
    text-decoration: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, #ff2b6c, #ff8ab3);
    color: #ffffff;
    box-shadow: 0 0 18px rgba(255, 43, 108, 0.25);
  }

  .btn-primary:hover {
    box-shadow: 0 0 26px rgba(255, 43, 108, 0.45);
    transform: translateY(-1px);
  }

  .btn-ghost {
    background: transparent;
    color: var(--accent-soft);
    border-color: var(--accent-soft);
  }

  .btn-ghost:hover {
    background: rgba(255, 79, 136, 0.06);
    transform: translateY(-1px);
  }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255, 43, 108, 0.07);
    color: var(--accent-soft);
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  section {
    border-top: 1px solid rgba(25, 25, 36, 0.04);
    background: linear-gradient(to bottom, rgba(255, 255, 255, 0.7), transparent);
  }

  h2 {
    font-size: 1.6rem;
    margin-bottom: 8px;
  }

  .section-intro {
    color: var(--muted);
    font-size: 0.94rem;
    margin-bottom: 24px;
  }

  .two-col {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
    gap: 32px;
    align-items: flex-start;
  }

  @media (max-width: 768px) {
    .two-col {
      grid-template-columns: minmax(0, 1fr);
    }
  }

  .card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px 20px 18px;
    border: 1px solid var(--border);
    box-shadow: 0 10px 25px rgba(15, 20, 40, 0.08);
  }

  .card-alt {
    background: radial-gradient(circle at top left, #ffe3f0 0, #ffffff 40%, #f9f4ff 100%);
  }

  .muted {
    color: var(--muted);
    font-size: 0.9rem;
  }

  .timeline {
    display: grid;
    gap: 16px;
    margin-top: 12px;
  }

  .timeline-item {
    padding: 14px 16px 10px;
    border-radius: 12px;
    background: #faf7ff;
    border: 1px solid rgba(199, 191, 222, 0.7);
  }

  .timeline-title {
    font-size: 0.96rem;
    font-weight: 600;
    margin-bottom: 4px;
    color: var(--accent-soft);
  }

  .timeline-sub {
    font-size: 0.9rem;
    color: var(--muted);
  }

  .label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .columns {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 20px;
  }

  @media (max-width: 768px) {
    .columns {
      grid-template-columns: minmax(0,1fr);
    }
  }

  .form-note {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 8px;
  }

  .footer {
    font-size: 0.78rem;
    color: var(--muted);
    border-top: 1px solid rgba(25, 25, 36, 0.08);
    background: #ffffff;
  }

  .footer-links {
    margin-bottom: 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  .footer-links a {
    font-size: 0.8rem;
  }

  .small {
    font-size: 0.85rem;
  }

  input[type="text"],
  textarea {
    border-radius: 6px;
    border: 1px solid #d3d4e4;
    background: #ffffff;
    color: var(--text);
  }
</style>
